<!doctype html><html lang="da"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Velkommen</title>
<style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;
font-family:system-ui,sans-serif;color:#fff;text-align:center;
background:linear-gradient(135deg,#6a5cff,#57d0e0)}
.card{padding:8vw}h1{font-size:3rem;margin:.2em 0}
.emoji{font-size:5rem;animation:b 2s ease-in-out infinite}@keyframes b{50%{transform:translateY(-14px)}}
button{font:inherit;font-size:1.1rem;padding:.6em 1.2em;border:0;border-radius:999px;
background:#fff;color:#4a3cff;font-weight:700;cursor:pointer;margin-top:1em}</style></head>
<body><div class="card"><div class="emoji">🚀</div>
<h1>Velkommen til min side!</h1><p>Den er lavet med AI — og den er min egen.</p>
<button onclick="this.textContent='🎉 Hej!'">Tryk på mig</button></div></body></html>
