<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Duft-Guide</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #2c3e50; }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .duft-kort {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 200px;
        }
        /* En lille CSS-figur af en flaske */
        .flaske {
            width: 60px;
            height: 90px;
            background: #87ceeb;
            margin: 10px auto;
            border-radius: 10px 10px 5px 5px;
            border-top: 10px solid #555;
        }
    </style>
</head>
<body>

    <h1>Top 3: De bedste herredufte 👔</h1>
    <p>Her er nogle klassiske og friske valg!</p>

    <div class="container">
        <div class="duft-kort">
            <div class="flaske" style="background: #a8e063;"></div>
            <h3>Den Friske</h3>
            <p>Lugter af hav og citrus. Perfekt til hverdag!</p>
        </div>
        <div class="duft-kort">
            <div class="flaske" style="background: #4facfe;"></div>
            <h3>Den Mystiske</h3>
            <p>Lugter af træ og krydderier. God til fest.</p>
        </div>
        <div class="duft-kort">
            <div class="flaske" style="background: #ff9a9e;"></div>
            <h3>Den Elegante</h3>
            <p>En blød duft af blomster og læder. Meget unik.</p>
        </div>
    </div>

</body>
</html>
