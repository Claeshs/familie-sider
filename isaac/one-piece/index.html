<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min One Piece Side</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            padding: 20px;
            color: #333;
        }
        h1 {
            color: #d32f2f;
            font-size: 3em;
        }
        .pirat-flag {
            font-size: 100px;
            margin: 20px;
        }
        .skattekiste {
            background: #ffe082;
            padding: 20px;
            border-radius: 15px;
            border: 4px solid #ffb300;
            display: inline-block;
            margin-top: 20px;
        }
        button {
            background-color: #1976d2;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background-color: #0d47a1;
        }
    </style>
</head>
<body>

    <h1>Velkommen til Grand Line! 🏴‍☠️</h1>
    <div class="pirat-flag">💀</div>
    <p>Er du klar til at finde One Piece?</p>

    <div class="skattekiste">
        <h3>Min Drøm</h3>
        <p>At sejle ud med mit eget crew og finde verdens største skat!</p>
    </div>

    <br>
    <button onclick="alert('Du har fundet en hemmelig Devil Fruit! 🍎⚡')">Klik her for en overraskelse</button>

</body>
</html>
